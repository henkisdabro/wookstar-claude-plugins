<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title><!-- INJECT:PAGE_TITLE --></title>
  <style>
    :root {
      --bg: #e9ecef;
      --bg-grad-1: #dfe4ea;
      --bg-grad-2: #cfd4db;
      --text: #1a1a1a;
      --text-muted: #666;
      --chrome: #ffffff;
      --chrome-border: #e6e6e6;
      --chrome-shadow: 0 12px 40px rgba(0,0,0,0.12);
      --step-bg: #f2f2f2;
      --meta-label: #888;
      --meta-value: #222;
      --divider: #eee;
      --gmail: #EA4335;
      --outlook: #0078d4;
      --whatsapp: #25D366;
      --ok: #188038;
      --fail: #c0392b;
      --hint-bg: rgba(0,0,0,0.05);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0e0e10;
        --bg-grad-1: #14141a;
        --bg-grad-2: #1e1e24;
        --text: #f2f2f5;
        --text-muted: #a0a0a8;
        --chrome: #1b1b20;
        --chrome-border: #2a2a32;
        --chrome-shadow: 0 12px 40px rgba(0,0,0,0.5);
        --step-bg: #26262c;
        --meta-label: #888;
        --meta-value: #e8e8ec;
        --divider: #2a2a32;
        --hint-bg: rgba(255,255,255,0.08);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-y: scroll; }
    body {
      background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
      min-height: 100vh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px 16px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Three channel lanes, each a card: header (brand accent) + two equal-weight
       neutral buttons stacked as step 1 Copy, step 2 Open. Colour identifies the
       lane (accent bar + numbered badges); it never fills a button, so Copy and
       Open read as equal weight. */
    /* Never wrap: the three lanes stay side by side on one line at any width. */
    .lanes {
      width: 100%;
      max-width: 960px;
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: nowrap;
    }
    .lane {
      flex: 1 1 0;
      min-width: 0;
      background: var(--chrome);
      border: 1px solid var(--chrome-border);
      border-top: 3px solid var(--accent);
      border-radius: 12px;
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .lane-gmail { --accent: var(--gmail); }
    .lane-mail { --accent: var(--outlook); }
    .lane-whatsapp { --accent: var(--whatsapp); }
    .lane-head {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--accent);
    }
    /* Buttons stacked full width: step 1 above step 2, and each button's width
       is fixed by the lane (not its label), so the "Copied" flash cannot resize
       it or shift the button below. */
    .lane-actions { display: flex; flex-direction: column; gap: 8px; }

    .btn {
      border: none;
      color: #fff;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.08s, filter 0.15s, background 0.15s;
    }
    .btn:active { transform: translateY(1px); }
    .btn.copied { background: var(--ok) !important; color: #fff !important; border-color: var(--ok) !important; }
    .btn.failed { background: var(--fail) !important; color: #fff !important; border-color: var(--fail) !important; }

    /* Neutral, equal-weight lane buttons. */
    .btn.step {
      width: 100%;
      background: var(--step-bg);
      color: var(--text);
      border: 1px solid var(--chrome-border);
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      white-space: nowrap;
      overflow: hidden;
    }
    .btn.step:hover { background: var(--chrome-border); }
    .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      flex: none;
    }
    .btn.step .ext { opacity: 0.55; font-weight: 700; }

    .paste-note {
      width: 100%;
      max-width: 960px;
      margin: -2px 0 14px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
    }
    .paste-note b { color: var(--meta-value); font-weight: 600; }
    .paste-note .n {
      display: inline-flex; align-items: center; justify-content: center;
      width: 15px; height: 15px; border-radius: 50%;
      background: var(--text-muted); color: var(--chrome);
      font-size: 9px; font-weight: 700; vertical-align: middle;
    }

    /* Off-screen but still rendered, so innerText and selection stay valid for
       the copy path (display:none would break both). */
    .offscreen { position: absolute; left: -99999px; top: 0; width: 1px; height: 1px; overflow: hidden; }

    .preview-shell {
      width: 100%;
      max-width: 960px;
      background: var(--chrome);
      border: 1px solid var(--chrome-border);
      border-radius: 14px;
      box-shadow: var(--chrome-shadow);
      overflow: hidden;
    }

    .meta-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--divider);
      font-size: 14px;
    }
    .meta-row:last-of-type { border-bottom: 2px solid var(--divider); }
    .meta-row .label {
      width: 60px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--meta-label);
      flex-shrink: 0;
    }
    .meta-row .value { flex: 1; color: var(--meta-value); }
    .meta-row.hidden { display: none; }
    .meta-row .copyfield {
      background: none;
      border: 1px solid var(--chrome-border);
      color: var(--text-muted);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 5px;
      cursor: pointer;
    }
    .meta-row .copyfield:hover { color: var(--text); }

    .counts {
      padding: 8px 20px;
      border-bottom: 1px solid var(--divider);
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }
    .counts b { color: var(--text); font-weight: 600; }

    .body-frame {
      padding: 20px;
      background: #fff;
      color: #222;
    }
    .body-frame.outlook-frame { font-family: Aptos, Calibri, Arial, sans-serif; }
    .body-frame.gmail-frame { font-family: Arial, Helvetica, sans-serif; font-size: 13px; line-height: 19.5px; color: rgb(34, 34, 34); }

    .body-frame p { margin: 0 0 12px 0; }
    .body-frame ul, .body-frame ol { margin: 8px 0; padding-left: 28px; }
    .body-frame li { margin-bottom: 4px; }
    .body-frame blockquote.gmail_quote { margin: 0px 0px 0px 0.8ex; border-left: 1px solid rgb(204, 204, 204); padding-left: 1ex; }
    .body-frame strike { text-decoration: line-through; }
    .body-frame a { color: rgb(17, 85, 204); }
    .body-frame table { margin: 12px 0; }

    .hidden-platform { display: none; }

    .hints {
      width: 100%;
      max-width: 960px;
      margin-top: 12px;
      padding: 10px 14px;
      background: var(--hint-bg);
      border-radius: 8px;
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .hints kbd {
      background: var(--chrome);
      border: 1px solid var(--chrome-border);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: ui-monospace, monospace;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: var(--chrome);
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ok);
      margin-right: 6px;
      vertical-align: middle;
      box-shadow: 0 0 6px var(--ok);
    }
    .status-dot.offline { background: var(--fail); box-shadow: 0 0 6px var(--fail); }
    .status-dot.reconnecting { background: #f39c12; box-shadow: 0 0 6px #f39c12; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.4; } }

    @media (max-width: 640px) {
      body { padding: 12px 8px 40px; }
      .lane { padding: 8px 8px 10px; }
      .btn.step { padding: 8px 10px; font-size: 12px; }
      .meta-row .label { width: 44px; font-size: 10px; }
    }

    @media print {
      body { background: #fff; padding: 0; }
      .lanes, .paste-note, .hints, .counts, .toast, .status-dot { display: none !important; }
      .preview-shell { box-shadow: none; border: none; }
    }
  </style>
</head>
<body>

<div class="lanes">
  <div class="lane lane-gmail">
    <div class="lane-head">Gmail</div>
    <div class="lane-actions">
      <button class="btn step" id="copy-gmail" onclick="copyGmail(this)" title="Copy the Gmail-formatted message to your clipboard (G)"><span class="step-num">1</span> Copy for Gmail</button>
      <button class="btn step" onclick="composeInGmail()" title="Opens the Gmail web compose window in a new tab - then paste (Cmd+V) the copied message into the body"><span class="step-num">2</span> Open <span class="ext">&#8599;</span></button>
    </div>
  </div>
  <div class="lane lane-mail">
    <div class="lane-head">Mail app</div>
    <div class="lane-actions">
      <button class="btn step" id="copy-rich" onclick="copyRichText(this)" title="Copy the rich-text message for desktop mail clients: Thunderbird, Apple Mail, Outlook (T)"><span class="step-num">1</span> Copy Rich Text</button>
      <button class="btn step" onclick="openInMailApp()" title="Opens your default desktop mail app (Thunderbird, Apple Mail, Outlook) - then paste (Cmd+V) the copied message into the body (E)"><span class="step-num">2</span> Open <span class="ext">&#8599;</span></button>
    </div>
  </div>
  <div class="lane lane-whatsapp">
    <div class="lane-head">WhatsApp</div>
    <div class="lane-actions">
      <button class="btn step" id="copy-md" onclick="copyMarkdown(this)" title="Copy the light-markup Markdown / plain-text message to your clipboard (M)"><span class="step-num">1</span> Copy Markdown</button>
      <button class="btn step" onclick="sendViaWhatsApp()" title="Opens WhatsApp - then paste (Cmd+V) the copied message (W)"><span class="step-num">2</span> Open <span class="ext">&#8599;</span></button>
    </div>
  </div>
</div>

<div class="paste-note"><span class="n">1</span> <b>Copy</b> puts the message on your clipboard, then <span class="n">2</span> <b>Open &#8599;</b> launches the app - paste it (Cmd+V) into it.</div>

<div class="preview-shell">
  <div class="meta-row" id="to-row">
    <div class="label">To</div>
    <div class="value" id="to"><!-- INJECT:TO --></div>
    <button class="copyfield" onclick="copyFieldText('to', this)">Copy</button>
  </div>
  <div class="meta-row hidden" id="cc-row">
    <div class="label">CC</div>
    <div class="value" id="cc"><!-- INJECT:CC --></div>
    <button class="copyfield" onclick="copyFieldText('cc', this)">Copy</button>
  </div>
  <div class="meta-row hidden" id="bcc-row">
    <div class="label">BCC</div>
    <div class="value" id="bcc"><!-- INJECT:BCC --></div>
    <button class="copyfield" onclick="copyFieldText('bcc', this)">Copy</button>
  </div>
  <div class="meta-row" id="subject-row">
    <div class="label">Subject</div>
    <div class="value" id="subject"><!-- INJECT:SUBJECT --></div>
    <button class="copyfield" onclick="copyFieldText('subject', this)">Copy</button>
  </div>

  <div class="counts"><span><b id="word-count">0</b> words</span><span><b id="char-count">0</b> characters</span><span><b id="read-time">0</b> min read</span><span><span class="status-dot" id="status-dot"></span><span id="status-text">Live</span></span></div>

  <!-- Rich Text is the single visible preview. gmail-body stays in the DOM but
       off-screen (NOT display:none) so its innerText/selection still yield a
       faithful clipboard payload for "Copy for Gmail". whatsapp-raw is only ever
       read via innerHTML (layout-independent), so display:none is safe there. -->
  <div id="outlook-body" class="body-frame outlook-frame"><!-- INJECT:OUTLOOK_BODY --></div>
  <div id="gmail-body" class="body-frame gmail-frame offscreen"><!-- INJECT:GMAIL_BODY --></div>
  <div id="whatsapp-raw" class="hidden-platform"><!-- INJECT:RAW_BODY --></div>
</div>

<div class="hints">
  <span><kbd>G</kbd> Copy for Gmail</span>
  <span><kbd>T</kbd> Copy Rich Text</span>
  <span><kbd>M</kbd> Copy Markdown</span>
  <span><kbd>E</kbd> Open in Mail app</span>
  <span><kbd>W</kbd> Open in WhatsApp</span>
  <span><kbd>R</kbd> Force reload</span>
</div>

<div class="toast" id="toast"></div>

<script>
/* Shared client helpers (scripts/client/*.js), inlined at build time so the
   page stays self-contained. Exposes globals: mailtoAddrs, buildMailto,
   htmlToWhatsApp. */
/* INJECT:CLIENT_JS */
</script>

<script>
(function () {
  // Internal ids stay gmail/outlook/whatsapp (wired to build.ts + element ids).
  // A one-shot reminder shown when the user tabs back to this page after an
  // "open" action, so the "paste it, it's on your clipboard" message survives
  // the mail/WhatsApp app stealing focus.
  var pasteReminder = null;

  function $(id) { return document.getElementById(id); }
  function toast(msg, ms) {
    var t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(function () { t.classList.remove('show'); }, ms || 1800);
  }
  function armPasteReminder(msg) { pasteReminder = msg; }

  // Route "Open" actions through the preview server (POST /open), which hands
  // the URL to the OS default handler. Opening from page JS (window.open /
  // location.href) launches inside whatever renders this page - a cmux browser
  // pane or a VS Code/Zed in-app browser - where the user is usually not
  // signed in. The fallback covers the static-file case (no server behind the
  // page) and a server that refuses the URL.
  function openExternal(url, fallback) {
    fetch('/open?url=' + encodeURIComponent(url), { method: 'POST' })
      .then(function (r) { if (!r.ok) fallback(); })
      .catch(function () { fallback(); });
  }

  function hideIfEmpty(id, rowId) {
    var el = $(id);
    if (!el || !el.textContent.trim()) $(rowId).classList.add('hidden');
    else $(rowId).classList.remove('hidden');
  }

  // The single visible preview is the Rich Text (outlook) rendering.
  function updateCounts() {
    var text = $('outlook-body').innerText || '';
    var chars = text.length;
    var words = (text.match(/\S+/g) || []).length;
    var read = Math.max(1, Math.round(words / 200));
    $('char-count').textContent = chars;
    $('word-count').textContent = words;
    $('read-time').textContent = read;
  }

  function copyRichHtml(bodyId) {
    var body = $(bodyId);
    var html = body.innerHTML;
    var text = body.innerText;
    if (navigator.clipboard && window.ClipboardItem) {
      var item = new ClipboardItem({
        'text/html': new Blob([html], { type: 'text/html' }),
        'text/plain': new Blob([text], { type: 'text/plain' })
      });
      return navigator.clipboard.write([item]).then(function () { return true; }).catch(function () { return fallbackCopy(body); });
    }
    return Promise.resolve(fallbackCopy(body));
  }
  function fallbackCopy(el) {
    var sel = window.getSelection(), range = document.createRange();
    range.selectNodeContents(el);
    sel.removeAllRanges(); sel.addRange(range);
    var ok = document.execCommand('copy');
    sel.removeAllRanges();
    return ok;
  }

  // htmlToWhatsApp(rawHtml) is injected from scripts/client/whatsapp.js above.
  function whatsappText() { return htmlToWhatsApp($('whatsapp-raw').innerHTML); }

  function markCopyState(btn, ok, label) {
    btn.classList.remove('copied', 'failed');
    btn.classList.add(ok ? 'copied' : 'failed');
    var original = btn.innerHTML;
    btn.innerHTML = (ok ? '✓ ' : '✗ ') + label;
    setTimeout(function () {
      btn.classList.remove('copied', 'failed');
      btn.innerHTML = original;
    }, 1800);
  }

  // Three format-specific copy buttons (clipboard only). Gmail/Rich Text copy
  // the rendered HTML of their respective (possibly off-screen) body; Markdown
  // copies the light-markup transform of the raw source.
  function richCopyHandler(bodyId, successMsg) {
    return function (btn) {
      copyRichHtml(bodyId).then(function (ok) {
        markCopyState(btn, ok, 'Copied');
        toast(ok ? successMsg : 'Copy failed');
      });
    };
  }
  window.copyGmail = richCopyHandler('gmail-body', 'Copied Gmail formatting. Paste into Gmail.');
  window.copyRichText = richCopyHandler('outlook-body', 'Copied rich text. Paste into your mail client.');
  window.copyMarkdown = function (btn) {
    navigator.clipboard.writeText(whatsappText())
      .then(function () { markCopyState(btn, true, 'Copied'); toast('Copied Markdown. Paste anywhere.'); })
      .catch(function () { markCopyState(btn, false, 'Copy failed'); });
  };

  window.copyFieldText = function (id, btn) {
    var text = $(id).innerText.trim();
    navigator.clipboard.writeText(text).then(function () {
      btn.textContent = 'Copied';
      setTimeout(function () { btn.textContent = 'Copy'; }, 1200);
    });
  };

  function fields() {
    return {
      to: $('to').innerText.trim(),
      subject: $('subject').innerText.trim(),
      cc: $('cc').innerText.trim(),
      bcc: $('bcc').innerText.trim()
    };
  }

  // buildMailto()/mailtoAddrs() are injected from scripts/client/mailto.js above.
  // Copy the rich text, THEN open an empty-body mailto - navigation is gated on
  // the clipboard write resolving so the app switch cannot cancel it. If the
  // copy is refused, fall back to a body-carrying mailto so the user is never
  // left with an empty compose and nothing on the clipboard.
  window.openInMailApp = function () {
    var f = fields();
    copyRichHtml('outlook-body').then(function (ok) {
      if (ok) {
        var href = buildMailto({ to: f.to, subject: f.subject, cc: f.cc, bcc: f.bcc, body: '' }).href;
        openExternal(href, function () { window.location.href = href; });
        armPasteReminder('Rich text is on your clipboard - paste it (Cmd+V) into the email body.');
        toast('Opening your mail app - paste the body (Cmd+V).', 5000);
      } else {
        var body = ($('outlook-body').innerText || '').trim();
        var result = buildMailto({ to: f.to, subject: f.subject, cc: f.cc, bcc: f.bcc, body: body });
        if (result.overflow && navigator.clipboard) navigator.clipboard.writeText(body).catch(function () {});
        openExternal(result.href, function () { window.location.href = result.href; });
        toast(result.overflow ? 'Draft too long for the link - body copied, paste it in.' : 'Opening your mail app...');
      }
    });
  };

  window.composeInGmail = function () {
    copyRichHtml('gmail-body').then(function (ok) {
      if (!ok) { toast('Copy failed - Gmail not opened'); return; }
      var f = fields();
      var url = new URL('https://mail.google.com/mail/');
      url.searchParams.set('view', 'cm');
      url.searchParams.set('tf', '1');
      url.searchParams.set('to', f.to);
      url.searchParams.set('su', f.subject);
      if (f.cc) url.searchParams.set('cc', f.cc);
      if (f.bcc) url.searchParams.set('bcc', f.bcc);
      var gurl = url.toString();
      openExternal(gurl, function () { window.open(gurl, '_blank'); });
      armPasteReminder('Formatted message is on your clipboard - paste it (Cmd+V) into Gmail.');
      toast('Opening Gmail - paste (Cmd+V) to add the formatted message.', 5000);
    });
  };

  window.sendViaWhatsApp = function () {
    var text = whatsappText();
    // Always put the full message on the clipboard - it is the reliable path.
    if (navigator.clipboard) navigator.clipboard.writeText(text).catch(function () {});
    // whatsapp:// text prefill is truncated/mangled for long or multi-paragraph
    // messages, so only prefill for short ones; otherwise open the app and let
    // the user paste the copied text.
    if (text.length <= 700) {
      var wurl = 'whatsapp://send?text=' + encodeURIComponent(text);
      openExternal(wurl, function () { window.open(wurl); });
      toast('Opening WhatsApp...', 5000);
    } else {
      openExternal('whatsapp://send', function () { window.open('whatsapp://send'); });
      toast('Message copied - paste it into WhatsApp (Cmd+V).', 5000);
    }
    armPasteReminder('Message is on your clipboard - paste it (Cmd+V) into WhatsApp.');
  };

  // When the user tabs back to this page after an open action, remind them once.
  window.addEventListener('focus', function () {
    if (pasteReminder) { toast(pasteReminder, 4000); pasteReminder = null; }
  });

  function setStatus(state, label) {
    $('status-dot').className = 'status-dot' + (state !== 'live' ? ' ' + state : '');
    $('status-text').textContent = label;
  }

  // WebSocket hot reload with polling fallback
  function connect() {
    var ws;
    try { ws = new WebSocket('ws://' + location.host + '/ws'); }
    catch (e) { pollFallback(); return; }
    ws.onopen = function () { setStatus('live', 'Live'); };
    ws.onmessage = function (e) {
      try {
        var d = JSON.parse(e.data);
        if (d.type === 'reload') location.reload();
        if (d.type === 'error') setStatus('offline', 'Build error');
      } catch {}
    };
    ws.onclose = function () {
      setStatus('reconnecting', 'Reconnecting...');
      setTimeout(connect, 1000);
    };
    ws.onerror = function () { try { ws.close(); } catch {} };
  }
  function pollFallback() {
    var last = null;
    setInterval(function () {
      fetch('/check-modified').then(function (r) { return r.json(); }).then(function (d) {
        if (last === null) { last = d.mtime; return; }
        if (d.mtime !== last) location.reload();
      }).catch(function () {});
    }, 1000);
  }

  document.addEventListener('keydown', function (e) {
    if (e.target && /input|textarea|select/i.test(e.target.tagName)) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    var k = e.key.toLowerCase();
    if (k === 'g') copyGmail($('copy-gmail'));
    else if (k === 't') copyRichText($('copy-rich'));
    else if (k === 'm') copyMarkdown($('copy-md'));
    else if (k === 'e') openInMailApp();
    else if (k === 'w') sendViaWhatsApp();
    else if (k === 'r') location.reload();
  });

  document.addEventListener('DOMContentLoaded', function () {
    hideIfEmpty('cc', 'cc-row');
    hideIfEmpty('bcc', 'bcc-row');
    updateCounts();
    if (typeof WebSocket !== 'undefined') connect(); else pollFallback();
  });
})();
</script>

</body>
</html>
