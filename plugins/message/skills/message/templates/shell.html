<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title><!-- INJECT:PAGE_TITLE --></title>
  <style>
    :root {
      --bg: #e9ecef;
      --bg-grad-1: #dfe4ea;
      --bg-grad-2: #cfd4db;
      --text: #1a1a1a;
      --text-muted: #666;
      --chrome: #ffffff;
      --chrome-border: #e6e6e6;
      --chrome-shadow: 0 12px 40px rgba(0,0,0,0.12);
      --tab-active-bg: #1a1a1a;
      --tab-active-text: #fff;
      --tab-inactive-bg: #f2f2f2;
      --tab-inactive-text: #555;
      --tab-border: #e0e0e0;
      --meta-label: #888;
      --meta-value: #222;
      --divider: #eee;
      --gmail: #EA4335;
      --outlook: #0078d4;
      --whatsapp: #25D366;
      --ok: #188038;
      --fail: #c0392b;
      --hint-bg: rgba(0,0,0,0.05);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0e0e10;
        --bg-grad-1: #14141a;
        --bg-grad-2: #1e1e24;
        --text: #f2f2f5;
        --text-muted: #a0a0a8;
        --chrome: #1b1b20;
        --chrome-border: #2a2a32;
        --chrome-shadow: 0 12px 40px rgba(0,0,0,0.5);
        --tab-active-bg: #f2f2f5;
        --tab-active-text: #0e0e10;
        --tab-inactive-bg: #26262c;
        --tab-inactive-text: #bcbcc5;
        --tab-border: #2a2a32;
        --meta-label: #888;
        --meta-value: #e8e8ec;
        --divider: #2a2a32;
        --hint-bg: rgba(255,255,255,0.08);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-y: scroll; }
    body {
      background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
      min-height: 100vh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px 16px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .topbar {
      width: 100%;
      max-width: 960px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tabs {
      display: inline-flex;
      background: var(--chrome);
      border: 1px solid var(--chrome-border);
      border-radius: 10px;
      padding: 4px;
      gap: 2px;
    }
    .tab {
      border: none;
      background: transparent;
      color: var(--tab-inactive-text);
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 7px;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.15s, color 0.15s;
    }
    .tab:hover { background: var(--tab-inactive-bg); }
    .tab.active { background: var(--tab-active-bg); color: var(--tab-active-text); }
    .tab .kbd {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 5px;
      font-size: 10px;
      border: 1px solid currentColor;
      border-radius: 3px;
      opacity: 0.6;
    }
    .btn .kbd {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 5px;
      font-size: 10px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 3px;
    }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: none;
      color: #fff;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.08s, filter 0.15s;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn:active { transform: translateY(1px); }
    .btn.primary-gmail { background: var(--gmail); }
    .btn.primary-outlook { background: var(--outlook); }
    .btn.primary-whatsapp { background: var(--whatsapp); }
    .btn.ghost {
      background: var(--chrome);
      color: var(--text);
      border: 1px solid var(--chrome-border);
    }
    .btn.copied { background: var(--ok) !important; }
    .btn.failed { background: var(--fail) !important; }
    #copy-btn {
      min-width: 180px;
      text-align: right;
    }

    .preview-shell {
      width: 100%;
      max-width: 960px;
      background: var(--chrome);
      border: 1px solid var(--chrome-border);
      border-radius: 14px;
      box-shadow: var(--chrome-shadow);
      overflow: hidden;
    }

    .meta-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--divider);
      font-size: 14px;
    }
    .meta-row:last-of-type { border-bottom: 2px solid var(--divider); }
    .meta-row .label {
      width: 60px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--meta-label);
      flex-shrink: 0;
    }
    .meta-row .value { flex: 1; color: var(--meta-value); }
    .meta-row.hidden { display: none; }
    .meta-row .copyfield {
      background: none;
      border: 1px solid var(--chrome-border);
      color: var(--text-muted);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 5px;
      cursor: pointer;
    }
    .meta-row .copyfield:hover { color: var(--text); }

    .counts {
      padding: 8px 20px;
      border-bottom: 1px solid var(--divider);
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }
    .counts b { color: var(--text); font-weight: 600; }

    .body-frame {
      padding: 20px;
      background: #fff;
      color: #222;
    }
    .body-frame.outlook-frame { font-family: Aptos, Calibri, Arial, sans-serif; }
    .body-frame.gmail-frame { font-family: Arial, Helvetica, sans-serif; font-size: 13px; line-height: 19.5px; color: rgb(34, 34, 34); }

    .body-frame p { margin: 0 0 12px 0; }
    .body-frame ul, .body-frame ol { margin: 8px 0; padding-left: 28px; }
    .body-frame li { margin-bottom: 4px; }
    .body-frame blockquote.gmail_quote { margin: 0px 0px 0px 0.8ex; border-left: 1px solid rgb(204, 204, 204); padding-left: 1ex; }
    .body-frame strike { text-decoration: line-through; }
    .body-frame a { color: rgb(17, 85, 204); }
    .body-frame table { margin: 12px 0; }

    .whatsapp-frame {
      padding: 20px;
      background: #e5ddd5;
      color: #111;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.5;
      min-height: 120px;
    }

    .hidden-platform { display: none; }

    .hints {
      width: 100%;
      max-width: 960px;
      margin-top: 12px;
      padding: 10px 14px;
      background: var(--hint-bg);
      border-radius: 8px;
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .hints kbd {
      background: var(--chrome);
      border: 1px solid var(--chrome-border);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: ui-monospace, monospace;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: var(--chrome);
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ok);
      margin-right: 6px;
      vertical-align: middle;
      box-shadow: 0 0 6px var(--ok);
    }
    .status-dot.offline { background: var(--fail); box-shadow: 0 0 6px var(--fail); }
    .status-dot.reconnecting { background: #f39c12; box-shadow: 0 0 6px #f39c12; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.4; } }

    @media (max-width: 640px) {
      body { padding: 12px 8px 40px; }
      .topbar { flex-direction: column; align-items: stretch; }
      .tabs { justify-content: center; }
      .actions { justify-content: center; }
      .meta-row .label { width: 44px; font-size: 10px; }
    }

    @media print {
      body { background: #fff; padding: 0; }
      .topbar, .hints, .counts, .toast, .status-dot { display: none !important; }
      .preview-shell { box-shadow: none; border: none; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="gmail" onclick="showTab('gmail')">Gmail<span class="kbd">G</span></button>
    <button class="tab" data-tab="outlook" onclick="showTab('outlook')">Outlook<span class="kbd">O</span></button>
    <button class="tab" data-tab="whatsapp" onclick="showTab('whatsapp')">WhatsApp<span class="kbd">W</span></button>
  </div>
  <div class="actions">
    <button class="btn ghost" onclick="composeInGmail(this)">Compose in Gmail</button>
    <button class="btn ghost" onclick="sendViaWhatsApp(this)">Open WhatsApp</button>
    <button class="btn primary-gmail" onclick="copyCurrentTab(this)" id="copy-btn">Copy <span class="kbd">C</span></button>
  </div>
</div>

<div class="preview-shell">
  <div class="meta-row" id="to-row">
    <div class="label">To</div>
    <div class="value" id="to"><!-- INJECT:TO --></div>
    <button class="copyfield" onclick="copyFieldText('to', this)">Copy</button>
  </div>
  <div class="meta-row hidden" id="cc-row">
    <div class="label">CC</div>
    <div class="value" id="cc"><!-- INJECT:CC --></div>
    <button class="copyfield" onclick="copyFieldText('cc', this)">Copy</button>
  </div>
  <div class="meta-row hidden" id="bcc-row">
    <div class="label">BCC</div>
    <div class="value" id="bcc"><!-- INJECT:BCC --></div>
    <button class="copyfield" onclick="copyFieldText('bcc', this)">Copy</button>
  </div>
  <div class="meta-row" id="subject-row">
    <div class="label">Subject</div>
    <div class="value" id="subject"><!-- INJECT:SUBJECT --></div>
    <button class="copyfield" onclick="copyFieldText('subject', this)">Copy</button>
  </div>

  <div class="counts"><span><b id="word-count">0</b> words</span><span><b id="char-count">0</b> characters</span><span><b id="read-time">0</b> min read</span><span><span class="status-dot" id="status-dot"></span><span id="status-text">Live</span></span></div>

  <div id="gmail-body" class="body-frame gmail-frame"><!-- INJECT:GMAIL_BODY --></div>
  <div id="outlook-body" class="body-frame outlook-frame hidden-platform"><!-- INJECT:OUTLOOK_BODY --></div>
  <div id="whatsapp-body" class="whatsapp-frame hidden-platform"></div>
  <div id="whatsapp-raw" class="hidden-platform"><!-- INJECT:RAW_BODY --></div>
</div>

<div class="hints">
  <span><kbd>G</kbd> Gmail</span>
  <span><kbd>O</kbd> Outlook</span>
  <span><kbd>W</kbd> WhatsApp</span>
  <span><kbd>C</kbd> Copy current tab</span>
  <span><kbd>R</kbd> Force reload</span>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  var currentTab = 'gmail';
  var PRIMARY_CLASS = { gmail: 'primary-gmail', outlook: 'primary-outlook', whatsapp: 'primary-whatsapp' };

  function $(id) { return document.getElementById(id); }
  function toast(msg) {
    var t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(function () { t.classList.remove('show'); }, 1800);
  }

  function hideIfEmpty(id, rowId) {
    var el = $(id);
    if (!el || !el.textContent.trim()) $(rowId).classList.add('hidden');
    else $(rowId).classList.remove('hidden');
  }

  function updateCounts() {
    var text = $(currentTab === 'whatsapp' ? 'whatsapp-body' : currentTab + '-body').innerText || '';
    var chars = text.length;
    var words = (text.match(/\S+/g) || []).length;
    var read = Math.max(1, Math.round(words / 200));
    $('char-count').textContent = chars;
    $('word-count').textContent = words;
    $('read-time').textContent = read;
  }

  window.showTab = function (name) {
    currentTab = name;
    ['gmail', 'outlook', 'whatsapp'].forEach(function (t) {
      var body = $(t + '-body');
      var tab = document.querySelector('.tab[data-tab="' + t + '"]');
      if (body) body.classList.toggle('hidden-platform', t !== name);
      if (tab) tab.classList.toggle('active', t === name);
    });
    var btn = $('copy-btn');
    btn.className = 'btn ' + PRIMARY_CLASS[name];
    btn.innerHTML = 'Copy for ' + name.charAt(0).toUpperCase() + name.slice(1) + ' <span class="kbd">C</span>';
    updateCounts();
  };

  function copyRichHtml(bodyId) {
    var body = $(bodyId);
    var html = body.innerHTML;
    var text = body.innerText;
    if (navigator.clipboard && window.ClipboardItem) {
      var item = new ClipboardItem({
        'text/html': new Blob([html], { type: 'text/html' }),
        'text/plain': new Blob([text], { type: 'text/plain' })
      });
      return navigator.clipboard.write([item]).then(function () { return true; }).catch(function () { return fallbackCopy(body); });
    }
    return Promise.resolve(fallbackCopy(body));
  }
  function fallbackCopy(el) {
    var sel = window.getSelection(), range = document.createRange();
    range.selectNodeContents(el);
    sel.removeAllRanges(); sel.addRange(range);
    var ok = document.execCommand('copy');
    sel.removeAllRanges();
    return ok;
  }

  function htmlToWhatsApp() {
    var html = $('whatsapp-raw').innerHTML;
    html = html.replace(/<(strong|b)\b[^>]*>([\s\S]*?)<\/\1>/gi, '*$2*');
    html = html.replace(/<(em|i)\b[^>]*>([\s\S]*?)<\/\1>/gi, '_$2_');
    html = html.replace(/<(del|strike)\b[^>]*>([\s\S]*?)<\/\1>/gi, '~$2~');
    html = html.replace(/<pre[^>]*>\s*<code[^>]*>([\s\S]*?)<\/code>\s*<\/pre>/gi, '\n```\n$1\n```\n');
    html = html.replace(/<code\b[^>]*>([\s\S]*?)<\/code>/gi, '`$1`');
    html = html.replace(/<h[1-6][^>]*>([\s\S]*?)<\/h[1-6]>/gi, '\n*$1*\n');
    html = html.replace(/<hr\b[^>]*\/?>/gi, '\n---\n');
    html = html.replace(/<table\b[^>]*>([\s\S]*?)<\/table>/gi, function (m, inner) {
      var rows = [], trRe = /<tr\b[^>]*>([\s\S]*?)<\/tr>/gi, tr;
      while ((tr = trRe.exec(inner)) !== null) {
        var cells = [], tdRe = /<(?:td|th)\b[^>]*>([\s\S]*?)<\/(?:td|th)>/gi, td;
        while ((td = tdRe.exec(tr[1])) !== null) cells.push(td[1].replace(/<[^>]+>/g, '').trim());
        if (cells.length) rows.push(cells.join(' | '));
      }
      return '\n' + rows.join('\n') + '\n';
    });
    html = html.replace(/<ol\b[^>]*>([\s\S]*?)<\/ol>/gi, function (m, inner) {
      var items = [], n = 1, re = /<li\b[^>]*>([\s\S]*?)<\/li>/gi, li;
      while ((li = re.exec(inner)) !== null) items.push((n++) + '. ' + li[1].replace(/<[^>]+>/g, '').trim());
      return '\n' + items.join('\n') + '\n';
    });
    html = html.replace(/<ul\b[^>]*>([\s\S]*?)<\/ul>/gi, function (m, inner) {
      var items = [], re = /<li\b[^>]*>([\s\S]*?)<\/li>/gi, li;
      while ((li = re.exec(inner)) !== null) items.push('- ' + li[1].replace(/<[^>]+>/g, '').trim());
      return '\n' + items.join('\n') + '\n';
    });
    html = html.replace(/<blockquote\b[^>]*>([\s\S]*?)<\/blockquote>/gi, function (m, inner) {
      return '\n> ' + inner.replace(/<[^>]+>/g, '').trim() + '\n';
    });
    html = html.replace(/<br\s*\/?>/gi, '\n').replace(/<\/p>/gi, '\n').replace(/<p\b[^>]*>/gi, '');
    html = html.replace(/&nbsp;/gi, '').replace(/<[^>]+>/g, '');
    var ta = document.createElement('textarea'); ta.innerHTML = html;
    var text = ta.value.replace(/\n[ \t]+\n/g, '\n\n').replace(/\n{2,}/g, '\n\n');
    return text.trim();
  }

  function markCopyState(btn, ok, label) {
    btn.classList.remove('copied', 'failed');
    btn.classList.add(ok ? 'copied' : 'failed');
    var original = btn.innerHTML;
    btn.innerHTML = (ok ? '✓ ' : '✗ ') + label;
    setTimeout(function () {
      btn.classList.remove('copied', 'failed');
      btn.innerHTML = original;
    }, 1800);
  }

  window.copyCurrentTab = function (btn) {
    if (currentTab === 'whatsapp') {
      var text = htmlToWhatsApp();
      navigator.clipboard.writeText(text).then(function () { markCopyState(btn, true, 'Copied WhatsApp'); toast('Copied. Paste in WhatsApp.'); });
    } else {
      copyRichHtml(currentTab + '-body').then(function (ok) {
        markCopyState(btn, ok, 'Copied');
        toast(ok ? 'Copied. Paste in ' + currentTab + '.' : 'Copy failed');
      });
    }
  };

  window.copyFieldText = function (id, btn) {
    var text = $(id).innerText.trim();
    navigator.clipboard.writeText(text).then(function () {
      btn.textContent = 'Copied';
      setTimeout(function () { btn.textContent = 'Copy'; }, 1200);
    });
  };

  window.composeInGmail = function (btn) {
    copyRichHtml('gmail-body').then(function (ok) {
      if (!ok) { markCopyState(btn, false, 'Copy failed'); return; }
      var to = $('to').innerText.trim();
      var subject = $('subject').innerText.trim();
      var cc = $('cc').innerText.trim();
      var bcc = $('bcc').innerText.trim();
      var url = new URL('https://mail.google.com/mail/');
      url.searchParams.set('view', 'cm');
      url.searchParams.set('tf', '1');
      url.searchParams.set('to', to);
      url.searchParams.set('su', subject);
      if (cc) url.searchParams.set('cc', cc);
      if (bcc) url.searchParams.set('bcc', bcc);
      window.open(url.toString(), '_blank');
      toast('Opening Gmail... Paste (Ctrl+V) to add the formatted message');
    });
  };

  window.sendViaWhatsApp = function (btn) {
    var text = htmlToWhatsApp();
    navigator.clipboard.writeText(text);
    window.open('whatsapp://send?text=' + encodeURIComponent(text));
    toast('Opening WhatsApp...');
  };

  function renderWhatsApp() {
    var body = $('whatsapp-body');
    if (body) body.textContent = htmlToWhatsApp();
  }

  function setStatus(state, label) {
    $('status-dot').className = 'status-dot' + (state !== 'live' ? ' ' + state : '');
    $('status-text').textContent = label;
  }

  // WebSocket hot reload with polling fallback
  function connect() {
    var ws;
    try { ws = new WebSocket('ws://' + location.host + '/ws'); }
    catch (e) { pollFallback(); return; }
    ws.onopen = function () { setStatus('live', 'Live'); };
    ws.onmessage = function (e) {
      try {
        var d = JSON.parse(e.data);
        if (d.type === 'reload') location.reload();
        if (d.type === 'error') setStatus('offline', 'Build error');
      } catch {}
    };
    ws.onclose = function () {
      setStatus('reconnecting', 'Reconnecting...');
      setTimeout(connect, 1000);
    };
    ws.onerror = function () { try { ws.close(); } catch {} };
  }
  function pollFallback() {
    var last = null;
    setInterval(function () {
      fetch('/check-modified').then(function (r) { return r.json(); }).then(function (d) {
        if (last === null) { last = d.mtime; return; }
        if (d.mtime !== last) location.reload();
      }).catch(function () {});
    }, 1000);
  }

  document.addEventListener('keydown', function (e) {
    if (e.target && /input|textarea|select/i.test(e.target.tagName)) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    var k = e.key.toLowerCase();
    if (k === 'g') showTab('gmail');
    else if (k === 'o') showTab('outlook');
    else if (k === 'w') showTab('whatsapp');
    else if (k === 'c') copyCurrentTab($('copy-btn'));
    else if (k === 'r') location.reload();
  });

  document.addEventListener('DOMContentLoaded', function () {
    hideIfEmpty('cc', 'cc-row');
    hideIfEmpty('bcc', 'bcc-row');
    renderWhatsApp();
    updateCounts();
    showTab('gmail');
    if (typeof WebSocket !== 'undefined') connect(); else pollFallback();
  });
})();
</script>

</body>
</html>
